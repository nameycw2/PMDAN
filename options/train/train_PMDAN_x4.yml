# general settings
name: PMDAN_x4
model_type: SRModel
scale: 4
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0
# python basicsr/train.py -opt options/train/train_DFDAN_x2.yml --auto_resume  python basicsr/train.py -opt options/train/train_PMDAN_conv_x4.yml
# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
    #dataroot_gt: datasets/DIV2K/DIV2K_train_HR_sub
    #dataroot_lq: datasets/DIV2K/DIV2K_train_LR_bicubic/X4_sub
    # (for lmdb)
    dataroot_gt:  /home/user2/ycw/data/train_data/DF2K_sub/HR #datasets/DF2K_sub/HR # /home/user2/ycw/code/MSDAN-master/datasets/DF2K_sub/HR.lmdb 
    dataroot_lq:  /home/user2/ycw/data/train_data/DF2K_sub/LR_bicubic/LRx4 #datasets/DF2K_sub/LR_bicubic/X4 # /home/user2/ycw/code/MSDAN-master/datasets/DF2K_sub/LR_bicubic_X4.lmdb #
    filename_tmpl: '{}'
    io_backend:
      #type: disk
      # (for lmdb)
      type: disk #lmdb #disk

    gt_size: 256    # 64*64 LR input
    use_hflip: true
    use_rot: true

    # data loader
    num_worker_per_gpu: 8
    batch_size_per_gpu: 16
    dataset_enlarge_ratio: 10
    prefetch_mode: cuda
    pin_memory: true
 
  val:
    name: Set5
    type: PairedImageDataset    
    dataroot_gt: /home/user2/ycw/data/test_data/set5/mod4/GT # datasets/benchmark/Set5/mod2/GT
    dataroot_lq: /home/user2/ycw/data/test_data/set5/mod4/LRx4 # datasets/benchmark/Set5/mod2/LRX2  
    io_backend:
      type: disk

# network structures
network_g:
  type: PMDAN
  in_channels: 3
  num_feat: 56
  num_block: 8
  out_channels: 3
  upscale: 4

# path
path:
  pretrain_network_g: ~ #/home/user2/ycw/code/DFDAN-master/experiments/DFDAN_yuanban_8_8_10_guangfangceshiji/models/net_g_430000.pth
  strict_load_g: true
  resume_state: ~ #/home/user2/ycw/code/DFDAN-master/experiments/DFDAN_yuanban_8_8_10_guangfangceshiji/models/net_g_430000.pth

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 1e-3
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [1000000]
    restart_weights: [1]
    eta_min: !!float 1e-6

  total_iter: 1000000
  warmup_iter: -1  # no warm up




  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: true

  metrics:
    PSNR: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
      better: higher
    SSIM:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
      better: higher


# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
